# Gas City sandbox
#
# Usage:
#   GIT_USER="Your Name" GIT_EMAIL="you@example.com" FOLDER="/your/code" docker compose up -d
#   docker compose exec --user agent gascity zsh
#
# Or set these in a .env file (see .env.example).

services:
  gascity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gc-sandbox
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      GIT_USER: ${GIT_USER:-YourName}
      GIT_EMAIL: ${GIT_EMAIL:-you@example.com}
      GH_TOKEN: ${GH_TOKEN:?GH_TOKEN must be set in .env}
      HOME: /home/agent
    volumes:
      # Your gc folder. Set FOLDER in .env or pass as env var.
      - agent-home:/home/agent
      # Claude config — persists credentials and settings across docker compose down -v.
      - ./agent-config:/home/agent/.claude
      - ${FOLDER:?FOLDER must be set in .env}:/gc
      # Dolt on a named volume to avoid VirtioFS fsync issues on macOS.
      - dolt-data:/gc/.dolt-data

volumes:
  agent-home:
  dolt-data:
